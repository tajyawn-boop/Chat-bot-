<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하나님 나라 챗봇</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c; --surface: #1a1814; --surface2: #242019;
    --border: #3a3428; --gold: #c9a84c; --gold-light: #e8c97a;
    --gold-dim: #7a6230; --text: #f0ead8; --text-dim: #9a9080;
    --user-bubble: #2a2318; --bot-bubble: #1e1c16; --accent: #8b6914;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .header-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--gold-dim), var(--gold)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header-text h1 { font-family: 'Noto Serif KR', serif; font-size: 17px; font-weight: 700; color: var(--gold-light); }
  .header-text p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .status-dot { margin-left: auto; width: 8px; height: 8px; background: #4caf80; border-radius: 50%; box-shadow: 0 0 6px #4caf8066; }
  .chat-area { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .message { display: flex; gap: 10px; animation: fadeUp 0.3s ease; max-width: 88%; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.bot { align-self: flex-start; }
  .avatar { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; margin-top: 2px; }
  .bot .avatar { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); }
  .user .avatar { background: var(--surface2); border: 1px solid var(--border); }
  .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.75; }
  .bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-radius: 4px 16px 16px 16px; }
  .user .bubble { background: var(--user-bubble); border: 1px solid var(--accent); border-radius: 16px 4px 16px 16px; }
  .verse { display: block; margin-top: 10px; padding: 8px 12px; background: rgba(201,168,76,0.08); border-left: 3px solid var(--gold-dim); border-radius: 0 8px 8px 0; font-family: 'Noto Serif KR', serif; font-size: 12.5px; color: var(--gold-light); font-style: italic; }
  .typing-indicator { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.3s ease; }
  .typing-dots { background: var(--bot-bubble); border: 1px solid var(--border); border-radius: 4px 16px 16px 16px; padding: 14px 18px; display: flex; gap: 5px; align-items: center; }
  .typing-dots span { width: 6px; height: 6px; background: var(--gold-dim); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 20px 4px; flex-shrink: 0; }
  .chip { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); padding: 7px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
  .chip:hover { border-color: var(--gold-dim); color: var(--gold-light); background: rgba(201,168,76,0.06); }
  .input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 14px 20px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
  textarea { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; padding: 11px 14px; resize: none; outline: none; min-height: 44px; max-height: 120px; line-height: 1.5; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--gold-dim); }
  textarea::placeholder { color: var(--text-dim); }
  .send-btn { width: 44px; height: 44px; background: linear-gradient(135deg, var(--gold-dim), var(--gold)); border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .send-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; fill: #0f0e0c; }
  .welcome { text-align: center; padding: 32px 20px; animation: fadeUp 0.5s ease; }
  .welcome .cross { font-size: 36px; margin-bottom: 16px; display: block; }
  .welcome h2 { font-family: 'Noto Serif KR', serif; font-size: 20px; color: var(--gold-light); margin-bottom: 8px; }
  .welcome p { font-size: 13px; color: var(--text-dim); line-height: 1.7; max-width: 300px; margin: 0 auto; }
  .divider { width: 40px; height: 1px; background: var(--border); margin: 16px auto; }
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">✝</div>
  <div class="header-text">
    <h1>하나님 나라 챗봇</h1>
    <p>개혁주의 신앙 Q&A · 중고등부 수련회</p>
  </div>
  <div class="status-dot"></div>
</div>
<div class="chat-area" id="chatArea">
  <div class="welcome">
    <span class="cross">✝</span>
    <h2>안녕하세요! 👋</h2>
    <p>신앙에 대해 궁금한 것이 있으면 무엇이든 물어보세요. 하나님, 구원, 삶의 방향… 어떤 질문도 괜찮아요.</p>
    <div class="divider"></div>
    <p style="font-size:12px;">개혁주의 신학을 바탕으로 솔직하게 답해드릴게요 🙏</p>
  </div>
</div>
<div class="suggestions" id="suggestions">
  <button class="chip" onclick="sendSuggestion(this.textContent)">하나님은 정말 존재하나요?</button>
  <button class="chip" onclick="sendSuggestion(this.textContent)">왜 예수님을 믿어야 하나요?</button>
  <button class="chip" onclick="sendSuggestion(this.textContent)">기도가 정말 효과가 있나요?</button>
  <button class="chip" onclick="sendSuggestion(this.textContent)">나쁜 일이 왜 일어나나요?</button>
  <button class="chip" onclick="sendSuggestion(this.textContent)">천국은 어떤 곳인가요?</button>
</div>
<div class="input-area">
  <textarea id="userInput" placeholder="질문을 입력하세요..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>
<script>
var API_KEY = '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';
var API_URL = 'https://api.groq.com/openai/v1/chat/completions';

var SYSTEM_PROMPT = '당신은 개혁주의 신학을 기반으로 한 중고등부(14~18세) 수련회 신앙 Q&A 챗봇입니다.\n\n수련회 주제: "하나님 나라, 하나님의 방식으로" (로마서 12:2)\n\n핵심 교리 4기둥:\n1. 하나님의 주권 - 모든 것의 주인은 하나님이시며 역사와 삶을 친히 다스리신다\n2. 인간의 전적 타락 - 인간 스스로의 방식으로는 진정한 승리를 얻을 수 없다\n3. 은혜로운 구속 - 예수 그리스도의 십자가만이 진정한 승리의 길\n4. 성화와 순종 - 구원받은 자는 날마다 하나님의 방식으로 변화된다\n\n개혁주의 원칙: 웨스트민스터 소요리문답, 성경 완전 무오성, 하나님의 절대주권, 오직 성경/믿음/은혜/그리스도/하나님께 영광, TULIP.\n\n응답 규칙:\n- 반드시 한국어로만 답하세요\n- 14~18세 청소년이 이해하는 쉽고 친근한 말투\n- 따뜻하고 공감적인 톤\n- 성경 구절 1~2개를 [성경구절]내용[/성경구절] 형식으로 포함\n- 세상의 방식(성적, 외모, SNS)과 하나님의 방식을 대비\n- 학교, 친구, 입시 등 청소년 삶과 연결\n- 3~5문단으로 답하고 격려로 마무리';

var conversationHistory = [];
var isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendSuggestion(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function renderBubbleText(bubble, rawText) {
  var parsed = rawText.replace(/\[성경구절\]([\s\S]*?)\[\/성경구절\]/g, function(_, verse) {
    return '<span class="verse">"' + verse.trim() + '"</span>';
  });
  bubble.innerHTML = parsed.replace(/\n/g, '<br>');
}

function addMessage(role, text) {
  var chatArea = document.getElementById('chatArea');
  var welcome = chatArea.querySelector('.welcome');
  if (welcome) welcome.remove();
  var div = document.createElement('div');
  div.className = 'message ' + role;
  var avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? '✝' : '🙋';
  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (role === 'bot') { renderBubbleText(bubble, text); }
  else { bubble.textContent = text; }
  div.appendChild(avatar);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  var chatArea = document.getElementById('chatArea');
  var div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typingIndicator';
  var avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.style.background = 'linear-gradient(135deg, #7a6230, #c9a84c)';
  avatar.textContent = '✝';
  var dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  div.appendChild(avatar);
  div.appendChild(dots);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  var el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMessage() {
  if (isLoading) return;
  var input = document.getElementById('userInput');
  var text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('suggestions').style.display = 'none';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    var messages = [{ role: 'system', content: SYSTEM_PROMPT }].concat(conversationHistory);

    var response = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: messages,
        max_tokens: 1024,
        temperature: 0.7
      })
    });

    var data = await response.json();
    removeTyping();

    if (!response.ok) {
      var errMsg = (data.error && data.error.message) ? data.error.message : JSON.stringify(data);
      addMessage('bot', '오류: ' + errMsg);
    } else {
      var reply = data.choices[0].message.content;
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);
    }

  } catch(err) {
    removeTyping();
    addMessage('bot', '네트워크 오류가 발생했어요. 잠시 후 다시 시도해 주세요 🙏');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>
</body>
</html>
